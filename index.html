<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天系统（登录注册清晰版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Consolas,"Courier New",monospace}
body{background:#ECE9D8;color:#000;height:100vh;overflow:hidden}
.auth-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-box{background:#ECE9D8;border:3px solid #0054E8;padding:22px;width:330px;border-radius:6px}
.auth-title{font-size:18px;color:#0054E8;margin-bottom:16px;text-align:center;font-weight:700}
.auth-input{width:100%;padding:8px;margin-bottom:10px;border:2px solid #B8B6A6;border-radius:4px}
/* 登录/注册按钮视觉区分 */
.login-btn{background:#0054E8}
.register-btn{background:#009688}
.auth-btn{width:100%;padding:8px;color:#fff;border:none;border-radius:4px;font-weight:700;cursor:pointer}
.auth-switch{font-size:13px;text-align:center;color:#0054E8;cursor:pointer;margin-top:6px;text-decoration:underline}
.auth-tip{font-size:12px;color:red;text-align:center;margin-top:6px;display:none}

.pwd-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999}
.pwd-box{background:#ECE9D8;border:3px solid #0054E8;padding:20px;width:310px;border-radius:6px}
.pwd-title{font-size:16px;color:#0054E8;margin-bottom:14px;text-align:center}
.pwd-input{width:100%;padding:7px;margin-bottom:9px;border:2px solid #B8B6A6;border-radius:4px}
.pwd-btn{width:100%;padding:7px;background:#0054E8;color:#fff;border:none;border-radius:4px;cursor:pointer}
.pwd-tip{font-size:12px;color:red;text-align:center;margin-top:6px;display:none}

.admin-panel{position:fixed;top:40px;right:20px;background:#ECE9D8;border:3px solid #0054E8;padding:16px;width:340px;border-radius:6px;display:none;z-index:9998}
.admin-title{font-size:16px;color:#0054E8;margin-bottom:10px;text-align:center;font-weight:700}
.admin-info{font-size:13px;margin-bottom:10px}
.admin-set{margin-bottom:14px}
.admin-set label{font-size:12px;display:block;margin-bottom:4px}
.admin-set input{width:100%;padding:4px;border:2px solid #B8B6A6;border-radius:4px}
.admin-set button{width:100%;padding:4px;background:#0054E8;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-top:4px}
.admin-list{max-height:210px;overflow-y:auto;margin-bottom:10px}
.admin-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #ddd}
.admin-opt{display:flex;gap:6px}
.admin-btn{font-size:11px;padding:2px 6px;background:#0054E8;color:#fff;border-radius:3px;cursor:pointer}
.close-admin{text-align:center;font-size:12px;color:#0054E8;cursor:pointer}

.title-bar{height:32px;background:linear-gradient(to right,#003399,#0054E8);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 15px}
.account-ops{display:flex;gap:8px}
.account-btn{font-size:12px;padding:3px 6px;background:rgba(255,255,255,.2);border-radius:3px;cursor:pointer}

.main{display:flex;height:calc(100vh - 64px)}
.sidebar{width:210px;background:#D9D7C8;border-right:2px solid #B8B6A6;padding:12px;font-size:12px}
.sidebar-title{font-weight:700;margin-bottom:8px;border-bottom:2px solid #B8B6A6;padding-bottom:4px;color:#003399}
.online{margin-top:10px}
.online-item{margin:4px 0}
.status{font-size:12px;color:green;margin-top:10px}

.editor{flex:1;background:#fff;border:2px solid #B8B6A6;margin:8px;padding:12px;overflow-y:auto;font-size:14px;line-height:1.6}
.msg{margin:8px 0;padding-bottom:8px;border-bottom:2px solid #f0f0f0}
.user{font-size:12px;color:#003399;margin-bottom:3px;font-weight:700}
.admin-msg .user{color:#ff6600}
.admin-msg .content{background:#fff3e0;border-left:4px solid #ff6600}
.content{
  background:#f5f4ee;
  border:1px solid #d9d7c8;
  padding:8px;
  border-radius:4px;
  white-space:pre-wrap;
  word-wrap:break-word;
  border-left:4px solid #0054E8;
  width:100%;
  overflow-wrap:break-word;
  word-break:break-all;
}

.input-bar{height:36px;border-top:2px solid #e0e0e0;display:flex;align-items:center;padding:0 15px;background:#fff}
.prompt{color:#003399;font-size:15px;margin-right:10px}
#msgInput{flex:1;border:none;outline:0;background:transparent;font-size:14px}

.history-tip{
  text-align:center;
  font-size:11px;
  color:#666;
  margin:10px 0;
  padding:5px;
  background:#f0f0f0;
  border-radius:3px;
}

.sync-tip{
  position:fixed;
  bottom:10px;
  left:10px;
  font-size:11px;
  color:#0054E8;
  background:#ECE9D8;
  padding:4px 8px;
  border-radius:3px;
  border:1px solid #0054E8;
}
</style>
</head>
<body>

<div class="sync-tip" id="syncTip">数据已就绪 ✅</div>

<!-- 登录/注册弹窗（核心修复） -->
<div class="auth-modal" id="authModal">
  <div class="auth-box">
    <div class="auth-title" id="authTitle">登录</div>
    <input class="auth-input" id="username" placeholder="请输入用户名">
    <input type="password" class="auth-input" id="pwd" placeholder="请输入4位数字密码">
    <!-- 按钮添加明确类名，区分登录/注册 -->
    <button class="auth-btn login-btn" id="authBtn" onclick="auth()">登录</button>
    <div class="auth-switch" id="authSwitch" onclick="toggleAuth()">没有账号？点击注册</div>
    <div class="auth-tip" id="authTip"></div>
  </div>
</div>

<div class="pwd-modal" id="pwdModal">
  <div class="pwd-box">
    <div class="pwd-title">修改密码</div>
    <input type="password" class="pwd-input" id="oldPwd" placeholder="原密码">
    <input type="password" class="pwd-input" id="newPwd" placeholder="新4位密码">
    <input type="password" class="pwd-input" id="cfmPwd" placeholder="确认新密码">
    <button class="auth-btn" onclick="doChangePwd()">确认修改</button>
    <div class="auth-switch" onclick="closePwd()">取消</div>
    <div class="auth-tip" id="pwdTip"></div>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-title">管理员面板</div>
  <div class="admin-info" id="adminInfo"></div>
  <div class="admin-set">
    <label>最大账户数</label>
    <input type="number" id="maxInput" min="1" max="99">
    <button onclick="saveMax()">保存</button>
  </div>
  <div class="admin-list" id="adminList"></div>
  <div class="close-admin" onclick="closeAdmin()">关闭</div>
</div>

<div class="title-bar">
  <div>聊天系统</div>
  <div class="account-ops">
    <div class="account-btn" id="changePwdBtn" style="display:none" onclick="openPwd()">修改密码</div>
    <div class="account-btn" id="adminBtn" style="display:none" onclick="openAdmin()">管理员</div>
    <div class="account-btn" id="logoutBtn" style="display:none" onclick="logout()">退出</div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">菜单</div>
    <div>聊天</div>
    <div class="sidebar-title">在线用户</div>
    <div class="online" id="onlineList"></div>
    <div class="status" id="status"></div>
  </div>
  <div class="editor" id="editor"></div>
</div>

<div class="input-bar">
  <div class="prompt">//></div>
  <input id="msgInput" disabled placeholder="请先登录">
</div>

<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
<script>
const ADMIN = { name: "admin", pwd: "8888" };
const SERVER = "https://socketio-chat-h9jt.onrender.com";

const STORAGE = {
  accounts: "chat_accounts",
  maxAccounts: "chat_max",
  history: "chat_history",
  session: "chat_session"
};

let accounts = [];
let maxAccounts = 10;
let chatHistory = [];
let me = null;
let isAdmin = false;
let socket = null;
let isRegisterMode = false; // 明确标记当前是登录/注册模式
const MAX_HISTORY = 8;

window.onload = () => {
  loadLocal();
  restoreSession();
  bindEnter();
  initSocket();
  syncAcrossBrowsers();
};

// ================= 核心修复：登录/注册切换逻辑（清晰无歧义） =================
function toggleAuth() {
  const authTitle = document.getElementById("authTitle");
  const authBtn = document.getElementById("authBtn");
  const authSwitch = document.getElementById("authSwitch");
  const authTip = document.getElementById("authTip");
  
  // 清空提示
  authTip.style.display = "none";
  
  // 切换模式
  isRegisterMode = !isRegisterMode;
  
  if (isRegisterMode) {
    // 注册模式
    authTitle.innerText = "注册";
    authBtn.innerText = "注册";
    authBtn.className = "auth-btn register-btn"; // 换颜色区分
    authSwitch.innerText = "已有账号？点击登录";
    document.getElementById("pwd").placeholder = "请设置4位数字密码";
  } else {
    // 登录模式
    authTitle.innerText = "登录";
    authBtn.innerText = "登录";
    authBtn.className = "auth-btn login-btn"; // 还原登录按钮样式
    authSwitch.innerText = "没有账号？点击注册";
    document.getElementById("pwd").placeholder = "请输入4位数字密码";
  }
}

// ================= 登录/注册核心逻辑（严格区分） =================
function auth() {
  const username = document.getElementById("username").value.trim();
  const pwd = document.getElementById("pwd").value.trim();
  const authTip = document.getElementById("authTip");
  
  // 通用验证
  if (!username) { 
    authTip.innerText = "用户名不能为空！"; 
    authTip.style.display = "block"; 
    return; 
  }
  if (!pwd) { 
    authTip.innerText = "密码不能为空！"; 
    authTip.style.display = "block"; 
    return; 
  }
  if (!/^\d{4}$/.test(pwd)) { 
    authTip.innerText = "密码必须是4位数字！"; 
    authTip.style.display = "block"; 
    return; 
  }

  // 注册逻辑（严格区分）
  if (isRegisterMode) {
    // 禁止注册admin
    if (username === ADMIN.name) {
      authTip.innerText = "该用户名不可注册！";
      authTip.style.display = "block";
      return;
    }
    // 检查用户名是否已存在
    if (accounts.some(user => user.name === username)) {
      authTip.innerText = "用户名已存在！";
      authTip.style.display = "block";
      return;
    }
    // 检查账户上限
    const normalUsers = accounts.filter(user => user.name !== ADMIN.name);
    if (normalUsers.length >= maxAccounts) {
      authTip.innerText = "账户已达上限，无法注册！";
      authTip.style.display = "block";
      return;
    }
    
    // 执行注册
    accounts.push({ name: username, pwd: pwd });
    saveAccounts();
    
    authTip.innerText = "注册成功！即将跳转到登录...";
    authTip.style.color = "#009688"; // 绿色提示
    authTip.style.display = "block";
    
    // 自动切回登录模式
    setTimeout(() => {
      toggleAuth();
      document.getElementById("username").value = username;
      document.getElementById("pwd").value = "";
      authTip.style.display = "none";
    }, 1500);
    return;
  }

  // 登录逻辑（严格区分）
  if (!isRegisterMode) {
    // 管理员登录
    if (username === ADMIN.name && pwd === ADMIN.pwd) {
      me = username;
      isAdmin = true;
      saveSession(username);
      document.getElementById("authModal").style.display = "none";
      afterLogin();
      return;
    }
    
    // 普通用户登录
    const user = accounts.find(u => u.name === username && u.pwd === pwd);
    if (user) {
      me = username;
      isAdmin = false;
      saveSession(username);
      document.getElementById("authModal").style.display = "none";
      afterLogin();
      return;
    } else {
      authTip.innerText = "用户名或密码错误！";
      authTip.style.display = "block";
      return;
    }
  }
}

// ================= 其他核心功能（保留完整） =================
function loadLocal() {
  accounts = JSON.parse(localStorage.getItem(STORAGE.accounts)) || [];
  maxAccounts = parseInt(localStorage.getItem(STORAGE.maxAccounts)) || 10;
  chatHistory = JSON.parse(localStorage.getItem(STORAGE.history)) || [];
}

function saveAccounts() {
  localStorage.setItem(STORAGE.accounts, JSON.stringify(accounts));
}

function saveMax() {
  const maxVal = parseInt(document.getElementById("maxInput").value);
  if (maxVal && maxVal >= 1) {
    maxAccounts = maxVal;
    localStorage.setItem(STORAGE.maxAccounts, maxAccounts);
    document.getElementById("adminInfo").innerText = `用户数：${accounts.length}  上限：${maxAccounts}`;
  }
}

function saveHistory(msg) {
  chatHistory.push(msg);
  if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(-MAX_HISTORY);
  localStorage.setItem(STORAGE.history, JSON.stringify(chatHistory));
}

function saveSession(u) {
  localStorage.setItem(STORAGE.session, u);
}

function restoreSession() {
  const u = localStorage.getItem(STORAGE.session);
  if (!u) return;
  me = u;
  isAdmin = u === ADMIN.name;
  document.getElementById("authModal").style.display = "none";
  afterLogin();
}

function syncAcrossBrowsers() {
  window.addEventListener("storage", (e) => {
    if (e.key === STORAGE.accounts || e.key === STORAGE.history || e.key === STORAGE.maxAccounts) {
      loadLocal();
      if (me) showHistory();
      document.getElementById("syncTip").innerText = "跨浏览器同步已更新 ✅";
      setTimeout(() => document.getElementById("syncTip").innerText = "数据已就绪 ✅", 2000);
    }
  });
}

function afterLogin() {
  // 显示功能按钮
  document.getElementById("changePwdBtn").style.display = "inline-block";
  document.getElementById("logoutBtn").style.display = "inline-block";
  
  // 管理员显示管理员按钮
  if (isAdmin) {
    document.getElementById("adminBtn").style.display = "inline-block";
    refreshAdminPanel();
  }
  
  // 激活输入框
  document.getElementById("msgInput").disabled = false;
  document.getElementById("msgInput").placeholder = "输入消息后按回车发送...";
  
  // 显示历史消息
  showHistory();
  
  // 系统提示
  sys(`欢迎 ${isAdmin ? "管理员" : ""}${me} 登录！`);
  
  // 连接socket
  if (!isAdmin && socket) socket.emit("join", { user: me });
}

function showHistory() {
  const editor = document.getElementById("editor");
  // 清空原有历史提示
  const oldTips = editor.querySelectorAll(".history-tip");
  oldTips.forEach(t => t.remove());

  if (chatHistory.length === 0) return;

  // 添加历史提示
  const tip = document.createElement("div");
  tip.className = "history-tip";
  tip.innerText = "—— 最近聊天记录 ——";
  editor.appendChild(tip);

  // 显示历史消息
  chatHistory.forEach(m => addMsg(m.user, m.content, m.admin));
}

function sys(text) {
  addMsg("系统", text, false);
  saveHistory({ user: "系统", content: text, admin: false });
}

function addMsg(user, content, isAdminMsg) {
  const editor = document.getElementById("editor");
  const msgDiv = document.createElement("div");
  msgDiv.className = isAdminMsg ? "msg admin-msg" : "msg";
  
  // 转义特殊字符，避免XSS
  const safeContent = content.replace(/</g, "&lt;").replace(/>/g, "&gt;");
  
  msgDiv.innerHTML = `
    <div class="user">// ${user}</div>
    <div class="content">${safeContent}</div>
  `;
  
  editor.appendChild(msgDiv);
  // 滚动到底部
  editor.scrollTop = editor.scrollHeight;
}

function bindEnter() {
  document.getElementById("msgInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.target.disabled) {
      sendMsg();
    }
  });
}

function sendMsg() {
  const input = document.getElementById("msgInput");
  const content = input.value.trim();
  
  if (!content) return;
  
  // 发送消息
  const isAdminMsg = isAdmin;
  const userName = isAdmin ? "管理员" : me;
  
  addMsg(userName, content, isAdminMsg);
  saveHistory({ user: userName, content: content, admin: isAdminMsg });
  
  // 同步到socket
  if (socket) {
    socket.emit("chat message", {
      user: userName,
      content: content,
      admin: isAdminMsg
    });
  }
  
  // 清空输入框
  input.value = "";
}

function initSocket() {
  socket = io(SERVER);
  
  socket.on("connect", () => {
    document.getElementById("status").innerText = "已连接服务器 ✅";
  });
  
  socket.on("chat message", (msg) => {
    addMsg(msg.user, msg.content, msg.admin);
    saveHistory(msg);
  });
  
  socket.on("online users", (list) => {
    const onlineList = document.getElementById("onlineList");
    onlineList.innerHTML = "";
    
    list.filter(u => u !== ADMIN.name).forEach(user => {
      const item = document.createElement("div");
      item.className = "online-item";
      item.innerText = user;
      onlineList.appendChild(item);
    });
  });
  
  socket.on("disconnect", () => {
    document.getElementById("status").innerText = "服务器已断开 ❌";
  });
}

// ================= 管理员功能（完整恢复） =================
function openAdmin() {
  if (!isAdmin) return;
  document.getElementById("adminPanel").style.display = "block";
  refreshAdminPanel();
}

function closeAdmin() {
  document.getElementById("adminPanel").style.display = "none";
}

function refreshAdminPanel() {
  const adminInfo = document.getElementById("adminInfo");
  const adminList = document.getElementById("adminList");
  const maxInput = document.getElementById("maxInput");
  
  // 更新信息
  adminInfo.innerText = `用户数：${accounts.length}  上限：${maxAccounts}`;
  maxInput.value = maxAccounts;
  
  // 清空用户列表
  adminList.innerHTML = "";
  
  // 渲染用户列表（含操作按钮）
  accounts.forEach(user => {
    if (user.name === ADMIN.name) return; // 跳过管理员
    
    const item = document.createElement("div");
    item.className = "admin-item";
    item.innerHTML = `
      <div>${user.name}</div>
      <div class="admin-opt">
        <button class="admin-btn" onclick="resetPwd('${user.name}')">重置密码</button>
        <button class="admin-btn" onclick="deleteUser('${user.name}')">删除</button>
      </div>
    `;
    adminList.appendChild(item);
  });
}

function resetPwd(userName) {
  if (!confirm(`确定要将【${userName}】的密码重置为0000吗？`)) return;
  
  const user = accounts.find(u => u.name === userName);
  if (user) {
    user.pwd = "0000";
    saveAccounts();
    refreshAdminPanel();
    alert(`已重置【${userName}】的密码为0000！`);
  }
}

function deleteUser(userName) {
  if (!confirm(`确定要删除用户【${userName}】吗？删除后不可恢复！`)) return;
  
  accounts = accounts.filter(u => u.name !== userName);
  saveAccounts();
  refreshAdminPanel();
  alert(`已删除用户【${userName}】！`);
}

// ================= 密码修改功能 =================
function openPwd() {
  document.getElementById("pwdModal").style.display = "flex";
  document.getElementById("pwdTip").style.display = "none";
}

function closePwd() {
  document.getElementById("pwdModal").style.display = "none";
}

function doChangePwd() {
  const oldPwd = document.getElementById("oldPwd").value.trim();
  const newPwd = document.getElementById("newPwd").value.trim();
  const cfmPwd = document.getElementById("cfmPwd").value.trim();
  const pwdTip = document.getElementById("pwdTip");
  
  // 验证
  if (!oldPwd || !newPwd || !cfmPwd) {
    pwdTip.innerText = "所有密码项不能为空！";
    pwdTip.style.display = "block";
    return;
  }
  
  if (!/^\d{4}$/.test(newPwd)) {
    pwdTip.innerText = "新密码必须是4位数字！";
    pwdTip.style.display = "block";
    return;
  }
  
  if (newPwd !== cfmPwd) {
    pwdTip.innerText = "两次输入的新密码不一致！";
    pwdTip.style.display = "block";
    return;
  }
  
  // 管理员改密码
  if (isAdmin) {
    if (oldPwd !== ADMIN.pwd) {
      pwdTip.innerText = "原密码错误！";
      pwdTip.style.display = "block";
      return;
    }
    
    ADMIN.pwd = newPwd;
    pwdTip.innerText = "管理员密码修改成功！";
    pwdTip.style.color = "#009688";
    pwdTip.style.display = "block";
    
    setTimeout(closePwd, 1500);
    return;
  }
  
  // 普通用户改密码
  const user = accounts.find(u => u.name === me);
  if (user.pwd !== oldPwd) {
    pwdTip.innerText = "原密码错误！";
    pwdTip.style.display = "block";
    return;
  }
  
  user.pwd = newPwd;
  saveAccounts();
  
  pwdTip.innerText = "密码修改成功！";
  pwdTip.style.color = "#009688";
  pwdTip.style.display = "block";
  
  setTimeout(closePwd, 1500);
}

// ================= 退出登录 =================
function logout() {
  if (confirm("确定要退出登录吗？")) {
    if (socket && !isAdmin) socket.emit("leave", { user: me });
    me = null;
    isAdmin = false;
    localStorage.removeItem(STORAGE.session);
    // 重置界面
    document.getElementById("changePwdBtn").style.display = "none";
    document.getElementById("adminBtn").style.display = "none";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("msgInput").disabled = true;
    document.getElementById("msgInput").placeholder = "请先登录";
    // 显示登录弹窗
    document.getElementById("authModal").style.display = "flex";
    // 重置登录/注册模式为登录
    isRegisterMode = false;
    toggleAuth(); // 还原到登录状态
    // 清空输入框
    document.getElementById("username").value = "";
    document.getElementById("pwd").value = "";
  }
}
</script>
</body>
</html>
