<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-C++ - main.cpp</title>
<style>
/* 全局样式：Dev-C++ 浅色风格 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Courier New", Consolas, monospace;
}
body {
  background: #ECE9D8;
  color: #000;
  height: 100vh;
  overflow: hidden;
}

/* 窗口标题栏 */
.title-bar {
  height: 28px;
  background: linear-gradient(to right, #0054E8, #0072FF);
  color: #FFF;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 12px;
  justify-content: space-between;
}

/* 主布局：侧边栏+编辑区 */
.main {
  display: flex;
  height: calc(100vh - 90px); /* 适配输入区高度 */
}
.sidebar {
  width: 200px;
  background: #D9D7C8;
  border-right: 1px solid #B8B6A6;
  padding: 10px;
  font-size: 12px;
}
.sidebar-title {
  font-weight: bold;
  margin-bottom: 8px;
  border-bottom: 1px solid #B8B6A6;
  padding-bottom: 3px;
}
.editor {
  flex: 1;
  background: #FFFFFF;
  border: 1px solid #B8B6A6;
  margin: 5px;
  padding: 10px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.6;
}

/* 消息样式：统一靠左 + 换行 + 浅色分割线 */
.msg {
  margin: 6px 0;
  padding-bottom: 6px;
  border-bottom: 1px solid #F0F0F0; /* 浅色分割线区分消息 */
}
.user-name {
  font-size: 11px;
  color: #0054E8;
  margin-bottom: 2px;
}
.code-content {
  background: #F5F4EE;
  border: 1px solid #D9D7C8;
  padding: 6px 8px;
  border-radius: 2px;
  white-space: pre-wrap; /* 强制换行 */
  word-wrap: break-word;
  display: block; /* 占满整行，适配换行 */
  width: 100%;
}
/* 不同用户的左侧标识线 */
.dev1 .code-content { border-left: 3px solid #008000; }
.dev2 .code-content { border-left: 3px solid #FF8C00; }
.dev3 .code-content { border-left: 3px solid #FF0000; }
.dev4 .code-content { border-left: 3px solid #800080; }

/* 输入区：浅色分割线 + 支持换行 */
.input-area {
  height: 60px;
  border-top: 1px solid #E0E0E0; /* 浅色分割线 */
  display: flex;
  align-items: center;
  padding: 0 10px;
  background: #FFFFFF;
}
.prompt {
  color: #0054E8;
  font-size: 14px;
  margin-right: 8px;
}
#code-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 14px;
  padding: 5px 0;
  resize: none; /* 禁止手动调整大小 */
  height: 40px;
  white-space: pre-wrap; /* 输入框支持换行 */
  overflow-y: auto;
}

/* 用户选择弹窗 */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.modal-box {
  background: #ECE9D8;
  border: 2px solid #0054E8;
  padding: 15px;
  width: 280px;
}
.modal-title {
  font-size: 14px;
  color: #0054E8;
  margin-bottom: 10px;
}
.user-select {
  width: 100%;
  margin-bottom: 10px;
  padding: 3px;
}
.confirm-btn {
  width: 100%;
  padding: 4px 0;
  cursor: pointer;
}
</style>
</head>
<body>
  <!-- 用户选择弹窗 -->
  <div class="modal" id="user-modal">
    <div class="modal-box">
      <div class="modal-title">// 开发者标识配置</div>
      <select class="user-select" id="user-select">
        <option value="dev1">Dev1 (在线状态)</option>
        <option value="dev2">Dev2 (在线状态)</option>
        <option value="dev3">Dev3 (在线状态)</option>
        <option value="dev4">Dev4 (在线状态)</option>
      </select>
      <button class="confirm-btn" onclick="confirmUser()">确认配置</button>
    </div>
  </div>

  <!-- Dev-C++ 标题栏 -->
  <div class="title-bar">
    <div>main.cpp - Dev-C++ 5.11</div>
  </div>

  <!-- 主布局 -->
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-title">Project Explorer</div>
      <div>📁 My Project</div>
      <div>└─ main.cpp</div>
      <div style="margin-top: 15px; font-size: 11px; color: #666;" id="online-status">
        // 在线开发者：0/4
      </div>
    </div>
    <div class="editor" id="editor">
// C++ 代码协作终端
// 支持多行代码输入，自动换行
// 离开后自动释放用户名
#include &lt;iostream&gt;
using namespace std;

int main() {
    // 等待协作...
    return 0;
}
    </div>
  </div>

  <!-- 输入区 -->
  <div class="input-area">
    <div class="prompt">//></div>
    <textarea id="code-input" placeholder="输入代码/文字，Shift+Enter换行，Enter发送..."></textarea>
  </div>

  <script>
    // 全局变量
    let currentUser = "";
    const userMap = { dev1: "Dev1", dev2: "Dev2", dev3: "Dev3", dev4: "Dev4" };
    const roomId = "dev-cpp-team-2026";
    let messageList = [];
    
    // 核心：用户在线状态管理（自动释放+在线检测）
    let userStatus = JSON.parse(localStorage.getItem("dev_user_status")) || {
      dev1: { online: false, lastActive: 0 },
      dev2: { online: false, lastActive: 0 },
      dev3: { online: false, lastActive: 0 },
      dev4: { online: false, lastActive: 0 }
    };

    // 1. 转义HTML字符（防止代码执行）
    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
    }

    // 2. 更新在线状态（每30秒检测，5分钟无活动自动下线）
    function updateOnlineStatus() {
      // 标记当前用户为活跃
      if (currentUser) {
        userStatus[currentUser].online = true;
        userStatus[currentUser].lastActive = Date.now();
      }

      // 检测超时用户，自动下线
      const timeout = 5 * 60 * 1000; // 5分钟超时
      for (let user in userStatus) {
        if (userStatus[user].online && (Date.now() - userStatus[user].lastActive) > timeout) {
          userStatus[user].online = false; // 自动释放用户名
        }
      }

      // 保存状态 + 更新页面显示
      localStorage.setItem("dev_user_status", JSON.stringify(userStatus));
      const onlineCount = Object.values(userStatus).filter(u => u.online).length;
      document.getElementById("online-status").innerText = `// 在线开发者：${onlineCount}/4`;
    }

    // 3. 确认用户（检测在线状态，不重复占用）
    function confirmUser() {
      const selected = document.getElementById("user-select").value;
      if (!selected) return alert("// 请选择开发者标识！");

      // 检测该用户是否在线
      if (userStatus[selected].online) {
        alert(`// 错误：${userMap[selected]} 已在线，请选择其他标识！`);
        return;
      }

      // 标记当前用户上线
      currentUser = selected;
      userStatus[currentUser].online = true;
      userStatus[currentUser].lastActive = Date.now();
      updateOnlineStatus();

      // 关闭弹窗，初始化功能
      document.getElementById("user-modal").style.display = "none";
      initChat();
      
      // 绑定输入事件：Shift+Enter换行，Enter发送
      const input = document.getElementById("code-input");
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
          input.value = "";
        }
      });

      // 页面关闭/刷新时，自动下线
      window.addEventListener("beforeunload", () => {
        if (currentUser) {
          userStatus[currentUser].online = false;
          localStorage.setItem("dev_user_status", JSON.stringify(userStatus));
        }
      });

      // 定时更新在线状态
      setInterval(updateOnlineStatus, 30 * 1000); // 每30秒更新一次
    }

    // 4. 初始化跨网聊天
    function initChat() {
      setInterval(() => {
        fetch(`https://jsonplaceholder.typicode.com/posts/${roomId}`)
          .then(res => res.json())
          .then(data => {
            if (data.body) {
              const newMessages = JSON.parse(data.body);
              if (newMessages.length > messageList.length) {
                const unread = newMessages.slice(messageList.length);
                unread.forEach(msg => addMessage(msg));
                messageList = newMessages;
              }
            }
          })
          .catch(err => console.log("// 代码同步中...", err));
      }, 500);
    }

    // 5. 发送消息（支持换行）
    function sendMessage() {
      const input = document.getElementById("code-input");
      const rawContent = input.value.trim();
      if (!rawContent || !currentUser) return;

      // 转义内容，防止执行
      const safeContent = escapeHtml(rawContent);
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const message = {
        username: currentUser,
        name: userMap[currentUser],
        content: safeContent,
        time: time
      };

      // 本地显示消息
      addMessage(message);
      // 同步到跨网接口
      messageList.push(message);
      fetch(`https://jsonplaceholder.typicode.com/posts/${roomId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ body: JSON.stringify(messageList) })
      }).catch(err => console.log("// 代码同步失败，本地已保存", err));
    }

    // 6. 添加消息（统一靠左 + 自动换行 + 分割线）
    function addMessage(msg) {
      const editor = document.getElementById("editor");
      const msgDiv = document.createElement("div");
      msgDiv.className = `msg ${msg.username}`;
      
      msgDiv.innerHTML = `
        <div class="user-name">// ${msg.name} [${msg.time}]</div>
        <div class="code-content">${msg.content}</div>
      `;
      
      editor.appendChild(msgDiv);
      editor.scrollTop = editor.scrollHeight; // 自动滚动到底部
    }

    // 初始化在线状态显示
    updateOnlineStatus();
  </script>
</body>
</html>
