<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天系统（在线用户正常版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Consolas,"Courier New",monospace}
body{background:#ECE9D8;color:#000;height:100vh;overflow:hidden}

.auth-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-box{background:#ECE9D8;border:3px solid #0054E8;padding:22px;width:330px;border-radius:6px}
.auth-title{font-size:18px;color:#0054E8;margin-bottom:16px;text-align:center;font-weight:700}
.auth-input{width:100%;padding:8px;margin-bottom:10px;border:2px solid #B8B6A6;border-radius:4px}
.login-btn{background:#0054E8}
.register-btn{background:#009688}
.auth-btn{width:100%;padding:8px;color:#fff;border:none;border-radius:4px;font-weight:700;cursor:pointer}
.auth-switch{font-size:13px;text-align:center;color:#0054E8;cursor-pointer;margin-top:6px}
.auth-tip{font-size:12px;color:red;text-align:center;margin-top:6px;display:none}

.pwd-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999}
.pwd-box{background:#ECE9D8;border:3px solid #0054E8;padding:20px;width:310px;border-radius:6px}
.pwd-title{font-size:16px;color:#0054E8;margin-bottom:14px;text-align:center}
.pwd-input{width:100%;padding:7px;margin-bottom:9px;border:2px solid #B8B6A6;border-radius:4px}
.pwd-tip{font-size:12px;color:red;text-align:center;margin-top:6px;display:none}

.admin-panel{position:fixed;top:40px;right:20px;background:#ECE9D8;border:3px solid #0054E8;padding:16px;width:340px;border-radius:6px;display:none;z-index:9998}
.admin-title{font-size:16px;color:#0054E8;margin-bottom:10px;text-align:center;font-weight:700}
.admin-info{font-size:13px;margin-bottom:10px}
.admin-set{margin-bottom:14px}
.admin-set label{font-size:12px;display:block;margin-bottom:4px}
.admin-set input{width:100%;padding:4px;border:2px solid #B8B6A6;border-radius:4px}
.admin-set button{width:100%;padding:4px;background:#0054E8;color:#fff;border-radius:4px;cursor:pointer}
.admin-list{max-height:210px;overflow-y:auto;margin-bottom:10px}
.admin-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #ddd}
.admin-opt{display:flex;gap:6px}
.admin-btn{font-size:11px;padding:2px 6px;background:#0054E8;color:#fff;border-radius:3px;cursor:pointer}
.close-admin{text-align:center;font-size:12px;color:#0054E8;cursor:pointer}

.title-bar{height:32px;background:linear-gradient(to right,#003399,#0054E8);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 15px}
.account-ops{display:flex;gap:8px}
.account-btn{font-size:12px;padding:3px 6px;background:rgba(255,255,255,.2);border-radius:3px;cursor:pointer}

.main{display:flex;height:calc(100vh - 110px)}
.sidebar{width:210px;background:#D9D7C8;border-right:2px solid #B8B6A6;padding:12px;font-size:12px;overflow-y:auto}
.sidebar-title{font-weight:700;margin-bottom:8px;border-bottom:2px solid #B8B6A6;padding-bottom:4px;color:#003399}
.online{margin-top:10px;}
.online-item{margin:4px 0;padding:3px 6px;background:#fff;border-radius:3px;}
.status{font-size:12px;color:green;margin-top:10px}

.editor{flex:1;background:#fff;border:2px solid #B8B6A6;margin:8px;padding:12px;overflow-y:auto;font-size:14px;line-height:1.6}
.msg{margin:8px 0;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.user{font-size:12px;color:#003399;margin-bottom:3px;font-weight:700}
.admin-msg .user{color:#ff6600}
.admin-msg .content{background:#fff3e0;border-left:4px solid #ff6600}
.content{
  background:#f5f4ee;
  border:1px solid #d9d7c8;
  padding:8px;
  border-radius:4px;
  white-space: pre-wrap !important;
  word-wrap: break-word !important;
  overflow-wrap: break-word !important;
  word-break: break-all !important;
  border-left:4px solid #0054E8;
  width:100%;
  line-height:1.5;
}

.input-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:12px 16px;
  background:#fff;
  border-top:1px solid #eee;
  z-index:100;
  display:flex;
  gap:10px;
  align-items:flex-end;
}

#msgInput{
  flex:1;
  min-height:40px;
  max-height:120px;
  padding:10px 14px;
  border-radius:20px;
  border:1px solid #ddd;
  outline:none;
  font-size:14px;
  line-height:1.4;
  resize:none;
  overflow-y:auto;
  white-space:pre-wrap;
  word-wrap:break-word;
  background:#f7f7f7;
}
#msgInput:focus{
  background:#fff;
  border-color:#0054E8;
}

.send-btn{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#0054E8;
  color:#fff;
  border:none;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.send-btn:hover{
  background:#0040bb;
}

.history-tip{text-align:center;font-size:11px;color:#666;margin:10px 0;padding:5px;background:#f0f0f0;border-radius:3px}
.sync-tip{display:none}
</style>
</head>
<body>

<div class="auth-modal" id="authModal">
  <div class="auth-box">
    <div id="authTitle">登录</div>
    <input class="auth-input" id="username" placeholder="用户名">
    <input type="password" class="auth-input" id="pwd" placeholder="4位数字密码">
    <button class="auth-btn login-btn" id="authBtn" onclick="auth()">登录</button>
    <div class="auth-switch" id="authSwitch" onclick="toggleAuth()">没有账号？注册</div>
    <div class="auth-tip" id="authTip"></div>
  </div>
</div>

<div class="pwd-modal" id="pwdModal">
  <div class="pwd-box">
    <div class="pwd-title">修改密码</div>
    <input type="password" class="pwd-input" id="oldPwd" placeholder="原密码">
    <input type="password" class="pwd-input" id="newPwd" placeholder="新4位密码">
    <input type="password" class="pwd-input" id="cfmPwd" placeholder="确认新密码">
    <button class="auth-btn" onclick="doChangePwd()">确认修改</button>
    <div class="auth-switch" onclick="closePwd()">取消</div>
    <div class="auth-tip" id="pwdTip"></div>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-title">管理员面板</div>
  <div class="admin-info" id="adminInfo"></div>
  <div class="admin-set">
    <label>最大账户数</label>
    <input type="number" id="maxInput" min="1" max:99>
    <button onclick="saveMax()">保存</button>
  </div>
  <div class="admin-list" id="adminList"></div>
  <div class="close-admin" onclick="closeAdmin()">关闭</div>
</div>

<div class="title-bar">
  <div>聊天系统</div>
  <div class="account-ops">
    <div class="account-btn" id="changePwdBtn" style="display:none" onclick="openPwd()">修改密码</div>
    <div class="account-btn" id="adminBtn" style="display:none" onclick="openAdmin()">管理员</div>
    <div class="account-btn" id="logoutBtn" style="display:none" onclick="logout()">退出</div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">在线用户</div>
    <div class="online" id="onlineList"></div>
    <div class="status" id="status">连接中...</div>
  </div>
  <div class="editor" id="editor"></div>
</div>

<div class="input-bar">
  <textarea id="msgInput" disabled placeholder="输入消息… Shift+Enter 换行"></textarea>
  <button class="send-btn" onclick="send()">➤</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
<script>
const ADMIN = { name: "admin", pwd: "8888" };
const SERVER = "https://socketio-chat-h9jt.onrender.com";

const STORAGE = {
  accounts: "chat_accounts",
  maxAccounts: "chat_max",
  history: "chat_history",
  session: "chat_session"
};

let accounts = [];
let maxAccounts = 10;
let chatHistory = [];
let me = null;
let isAdmin = false;
let socket = null;
let isRegisterMode = false;
const MAX_HISTORY = 10;

window.onload = () => {
  loadLocal();
  restoreSession();
  bindEnter();
  initSocket();
};

window.addEventListener("storage", (e) => {
  if (e.key === STORAGE.accounts || e.key === STORAGE.maxAccounts) loadLocal();
  if (e.key === STORAGE.history && me) { loadLocal(); refreshChatOnlyHistory(); }
});

function loadLocal() {
  accounts = JSON.parse(localStorage.getItem(STORAGE.accounts)) || [];
  maxAccounts = parseInt(localStorage.getItem(STORAGE.maxAccounts)) || 10;
  chatHistory = JSON.parse(localStorage.getItem(STORAGE.history)) || [];
}

function saveAccounts(){localStorage.setItem(STORAGE.accounts,JSON.stringify(accounts))}
function saveMax(){
  const v=parseInt(maxInput.value);
  if(v>=1){maxAccounts=v;localStorage.setItem(STORAGE.maxAccounts,maxAccounts);openAdmin();}
}
function saveHistory(msg){
  chatHistory.push(msg);
  if(chatHistory.length>MAX_HISTORY)chatHistory=chatHistory.slice(-MAX_HISTORY);
  localStorage.setItem(STORAGE.history,JSON.stringify(chatHistory));
}

function restoreSession(){
  const u=localStorage.getItem(STORAGE.session);
  if(!u)return;
  me=u;
  isAdmin=u===ADMIN.name;
  authModal.style.display="none";
  afterLogin();
}

function toggleAuth(){
  isRegisterMode=!isRegisterMode;
  if(isRegisterMode){
    authTitle.innerText="注册";
    authBtn.innerText="注册";
    authBtn.className="auth-btn register-btn";
    authSwitch.innerText="已有账号？登录";
  }else{
    authTitle.innerText="登录";
    authBtn.innerText="登录";
    authBtn.className="auth-btn login-btn";
    authSwitch.innerText="没有账号？注册";
  }
  authTip.style.display="none";
}

function auth(){
  const n=username.value.trim();
  const p=pwd.value.trim();
  if(!n||!p){authTip.innerText="不能为空";authTip.style.display="block";return}
  if(!/^\d{4}$/.test(p)){authTip.innerText="4位数字";authTip.style.display="block";return}

  if(isRegisterMode){
    if(n===ADMIN.name||accounts.some(x=>x.name===n)){authTip.innerText="已存在";authTip.style.display="block";return}
    if(accounts.filter(x=>x.name!==ADMIN.name).length>=maxAccounts){authTip.innerText="已达上限";authTip.style.display="block";return}
    accounts.push({name:n,pwd:p});
    saveAccounts();
    authTip.innerText="注册成功";
    authTip.style.color="#096";
    authTip.style.display="block";
    setTimeout(toggleAuth,1200);
    return;
  }

  if(n===ADMIN.name&&p===ADMIN.pwd){
    me=n;isAdmin=true;
    localStorage.setItem(STORAGE.session,n);
    authModal.style.display="none";
    afterLogin();
    return;
  }

  const user=accounts.find(x=>x.name===n&&x.pwd===p);
  if(!user){authTip.innerText="账号或密码错误";authTip.style.display="block";return}
  me=n;isAdmin=false;
  localStorage.setItem(STORAGE.session,n);
  authModal.style.display="none";
  afterLogin();
}

function afterLogin(){
  changePwdBtn.style.display="inline-block";
  logoutBtn.style.display="inline-block";
  if(isAdmin)adminBtn.style.display="inline-block";
  msgInput.disabled=false;
  refreshChatOnlyHistory();
}

function refreshChatOnlyHistory(){
  editor.innerHTML='';
  if(chatHistory.length){
    const tip=document.createElement("div");
    tip.className="history-tip";
    tip.innerText="最近消息";
    editor.appendChild(tip);
    chatHistory.forEach(m=>addMsg(m.user,m.content,m.admin));
  }
}

function addMsg(user,content,adminMsg){
  const div=document.createElement("div");
  div.className=adminMsg?"msg admin-msg":"msg";
  const safe=content.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
  div.innerHTML=`<div class="user">// ${user}</div><div class="content">${safe}</div>`;
  editor.appendChild(div);
  editor.scrollTop=editor.scrollHeight;
}

function bindEnter(){
  msgInput.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!e.shiftKey){
      e.preventDefault();
      send();
    }
  });
}

function send(){
  const t=msgInput.value.trim();
  if(!t||!me)return;
  const data={user:isAdmin?"管理员":me,content:t,admin:isAdmin};
  addMsg(data.user,data.content,data.admin);
  saveHistory(data);
  if(socket)socket.emit("chat message",data);
  msgInput.value="";
}

function initSocket(){
  socket=io(SERVER);
  socket.on("chat message",m=>{
    const isSelf=(isAdmin&&m.user==="管理员")||(!isAdmin&&m.user===me);
    if(!isSelf){addMsg(m.user,m.content,m.admin);saveHistory(m);}
  });

  // ========== 在线用户正常显示 ==========
  socket.on("online users",list=>{
    onlineList.innerHTML = "";
    let show = list.filter(x => x !== ADMIN.name);
    if(show.length===0){
      onlineList.innerHTML = "<div class='online-item'>暂无在线用户</div>";
      return;
    }
    show.forEach(u=>{
      const d=document.createElement("div");
      d.className="online-item";
      d.innerText=u;
      onlineList.appendChild(d);
    });
  });

  socket.on("connect",()=>{
    status.innerText="已连接";
    if(me)socket.emit("join",{user:me});
  });
  socket.on("disconnect",()=>{status.innerText="已断开"});
}

function openAdmin(){
  if(!isAdmin)return;
  adminInfo.innerText=`用户数：${accounts.length} 上限：${maxAccounts}`;
  maxInput.value=maxAccounts;
  adminList.innerHTML="";
  accounts.forEach(u=>{
    if(u.name===ADMIN.name)return;
    const item=document.createElement("div");
    item.className="admin-item";
    item.innerHTML=`<div>${u.name}</div>
      <div class="admin-opt">
        <button class="admin-btn" onclick="resetPwd('${u.name}')">重置密码</button>
        <button class="admin-btn" onclick="delUser('${u.name}')">删除</button>
      </div>`;
    adminList.appendChild(item);
  });
  adminPanel.style.display="block";
}

function closeAdmin(){adminPanel.style.display="none"}
function resetPwd(n){
  const u=accounts.find(x=>x.name===n);
  if(u){u.pwd="0000";saveAccounts();openAdmin();alert("已重置为0000");}
}
function delUser(n){accounts=accounts.filter(x=>x.name!==n);saveAccounts();openAdmin();}

function openPwd(){pwdModal.style.display="flex";pwdTip.style.display="none"}
function closePwd(){pwdModal.style.display="none"}
function doChangePwd(){
  const o=oldPwd.value,n=newPwd.value,c=cfmPwd.value;
  if(!o||!n||!c||n!==c||!/^\d{4}$/.test(n)){pwdTip.innerText="输入有误";pwdTip.style.display="block";return}
  if(isAdmin){
    if(o!==ADMIN.pwd){pwdTip.innerText="原密码错";pwdTip.style.display="block";return}
    ADMIN.pwd=n;
  }else{
    const user=accounts.find(x=>x.name===me);
    if(user.pwd!==o){pwdTip.innerText="原密码错";pwdTip.style.display="block";return}
    user.pwd=n;saveAccounts();
  }
  pwdTip.innerText="修改成功";pwdTip.style.color="#096";pwdTip.style.display="block";
  setTimeout(closePwd,1200);
}

function logout(){
  if(socket)socket.emit("leave",{user:me});
  me=null;isAdmin=false;
  localStorage.removeItem(STORAGE.session);
  location.reload();
}
</script>
</body>
</html>
